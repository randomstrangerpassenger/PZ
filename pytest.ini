[pytest]
minversion = 7.0
testpaths =
    Iris/build/description/v2/tests
    Iris/build/tests/test_evidence_pipeline_cross_track.py
python_files = test_*.py
python_classes = *Test Test*
python_functions = test_*
pythonpath =
    .
    Iris/build
addopts =
    -ra
    --ignore=Iris/build/tests/test_description_generator.py
    --ignore=Iris/build/tests/test_determinism_rc.py
    --ignore=Iris/build/tests/test_fail_loud_coverage.py
    --ignore=Iris/build/tests/test_layer3_pipeline.py
    --ignore=Iris/build/tests/test_recipe_evidence.py
    --ignore=Iris/build/tests/test_wearable_6f.py
norecursedirs =
    .git
    .hg
    .svn
    .tox
    .venv
    venv
    __pycache__
    .tmp_tests
    tmp*
    Iris/_archive
    Iris/build/description/v2/.tmp_tests
